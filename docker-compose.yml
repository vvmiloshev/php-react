services:
  nginx:
    image: nginx:1.27-alpine
    container_name: php_react_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/dist:/var/www/frontend/dist
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: php_react_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - db
    networks:
      - app-network
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: php_react
      DB_USERNAME: app_user
      DB_PASSWORD: app_password

  db:
    image: mariadb:11.4
    container_name: php_react_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: php_react
      MARIADB_USER: app_user
      MARIADB_PASSWORD: app_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge